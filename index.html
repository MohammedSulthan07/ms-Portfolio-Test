<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Apply the Space Grotesk font to the body */
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Custom styles for input placeholder */
        .custom-placeholder::placeholder {
            color: white;
            opacity: 1; /* Firefox */
        }

        .custom-placeholder:-ms-input-placeholder { /* Internet Explorer 10-11 */
           color: white;
        }

        .custom-placeholder::-ms-input-placeholder { /* Microsoft Edge */
           color: white;
        }

        /* Shake animation for incorrect password */
        @keyframes shake {
          10%, 90% { transform: translate3d(-1px, 0, 0); }
          20%, 80% { transform: translate3d(2px, 0, 0); }
          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
          40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .shake {
            animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="flex flex-col items-center justify-center text-center p-4 space-y-10">
        <!-- Main Heading -->
        <h1 class="text-4xl md:text-6xl lg:text-8xl font-bold uppercase tracking-wider">
            Enter the <br> Captcha
        </h1>

        <!-- Captcha and Input section -->
        <div class="flex flex-col md:flex-row items-center justify-center gap-6 w-full max-w-lg">
            <!-- Captcha Image -->
            <div class="bg-white p-2 rounded-lg">
                 <!-- NOTE: Replace this src with the actual path to your captcha.png file -->
                <img src="captcha.png" alt="Captcha Image" class="h-12 md:h-16">
            </div>

            <!-- Input field -->
            <input type="text" id="captchaInput" placeholder="TYPE HERE..." class="custom-placeholder bg-transparent border border-white rounded-lg px-6 py-4 text-white text-lg w-full md:w-auto focus:outline-none focus:ring-2 focus:ring-white">
        </div>

        <!-- Enter Button -->
        <button id="enterButton" class="bg-transparent border border-white rounded-lg px-12 py-3 text-white font-bold tracking-widest hover:bg-white hover:text-black transition-colors duration-300">
            ENTER
        </button>
    </div>

    <script>
        // Get references to the input and button elements
        const captchaInput = document.getElementById('captchaInput');
        const enterButton = document.getElementById('enterButton');
        const correctPassword = "45510";

        // Function to handle verification and navigation
        function handleVerification() {
            if (captchaInput.value === correctPassword) {
                window.location.href = 'port.html';
            } else {
                // Add error classes for visual feedback
                captchaInput.classList.add('border-red-500', 'shake');
                
                // Clear the input for another try
                captchaInput.value = '';

                // Remove the error classes after the animation finishes
                setTimeout(() => {
                    captchaInput.classList.remove('border-red-500', 'shake');
                }, 820); // Match animation duration
            }
        }

        // Add click event listener to the button
        enterButton.addEventListener('click', handleVerification);

        // Add keydown event listener to the input field
        captchaInput.addEventListener('keydown', function(event) {
            // Check if the key pressed was 'Enter'
            if (event.key === 'Enter') {
                handleVerification();
            }
        });
    </script>

</body>
</html>
